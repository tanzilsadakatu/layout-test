<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Test</title>
  <link rel="stylesheet" href="../index.css">
  <link rel="stylesheet" href="exhibit-4.css">
</head>

<body>
  <header>
    <div class="container">
      <h1>Practicing layout design</h1>
    </div>
  </header>

  <div class="container">
    <a href="../index.html">Back to gallery</a>
  </div>

  <main class="main-section">
    <div class="tile-layout">
      <div class="row-1">
        <div class="left">
          <div class="box color-green"></div>
          <div class="box color-red"></div>
        </div>

        <div class="right">
          <div class="box color-blue"></div>
          <div class="box color-brown"></div>
        </div>
      </div>

      <div class="row-2">
        <div class="left">
          <div class="box color-brown"></div>
          <div class="box color-blue"></div>
        </div>

        <div class="right">
          <div class="box color-red"></div>
          <div class="box color-green"></div>
        </div>
      </div>

      <div class="row-3">
        <div class="left">
          <div class="box color-green"></div>
          <div class="box color-red"></div>
        </div>
        <div class="right">
          <div class="box color-blue"></div>
        </div>
      </div>
    </div>

  </main>

  <footer>
    <div class="container">
      <p>Sadakatu Tanzil</p>
    </div>
  </footer>
</body>

</html>
